name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Secret scanning ───────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for trufflehog
      - name: TruffleHog — scan for leaked secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  # ── 2. Python linting ────────────────────────────────────────────────────────
  lint-python:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linting tools
        run: pip install flake8 flake8-bugbear
      - name: flake8 — PySpark streaming job
        run: |
          flake8 spark-streaming/stream_processor.py \
            --max-line-length=100 \
            --extend-ignore=E203,W503
      - name: flake8 — Kafka producer
        run: |
          flake8 kafka-producer/producer.py \
            --max-line-length=100 \
            --extend-ignore=E203,W503
      - name: flake8 — Airflow DAG
        run: |
          flake8 airflow-dags/retail_pipeline_dag.py \
            --max-line-length=100 \
            --extend-ignore=E203,W503

  # ── 3. SQL linting ───────────────────────────────────────────────────────────
  lint-sql:
    name: SQL Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install sqlfluff
        run: pip install sqlfluff sqlfluff-templater-dbt
      - name: sqlfluff lint — dbt models (Snowflake dialect)
        run: |
          sqlfluff lint dbt/models/ \
            --dialect snowflake \
            --templater dbt \
            --ignore templating || true   # non-blocking until project adopts sqlfluff config
      - name: sqlfluff lint — monitoring SQL
        run: |
          sqlfluff lint monitoring/data_quality.sql \
            --dialect snowflake || true

  # ── 4. dbt compile ───────────────────────────────────────────────────────────
  # Uses a mock profile so no live Snowflake connection is required in CI.
  dbt-compile:
    name: dbt Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dbt-snowflake
        run: pip install dbt-snowflake==1.7.4
      - name: Write CI profiles.yml (no live connection)
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << 'EOF'
          default:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: ci_dummy
                user: ci_dummy
                password: ci_dummy
                role: ci_dummy
                database: RETAIL_DB
                warehouse: RETAIL_WH
                schema: STREAMING
                threads: 1
          EOF
      - name: dbt compile (syntax + ref validation, no execution)
        working-directory: dbt
        run: dbt compile --profiles-dir ~/.dbt --project-dir .

  # ── 5. Python unit tests ─────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          pip install pytest pytest-mock
      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short

  # ── 6. Docker build validation ───────────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Dockerfile.airflow
        run: |
          docker build -f Dockerfile.airflow -t retail-airflow:ci . \
            --cache-from type=gha --cache-to type=gha,mode=max
      - name: Build Dockerfile.superset
        run: |
          docker build -f Dockerfile.superset -t retail-superset:ci . \
            --cache-from type=gha --cache-to type=gha,mode=max
      # Note: Dockerfile.spark pre-downloads JARs at build time (slow in CI).
      # Skip here; validate separately on a scheduled workflow or when changed.

  # ── 7. Dependency audit ──────────────────────────────────────────────────────
  dep-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit Python dependencies for known CVEs
        run: pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42969 || true
