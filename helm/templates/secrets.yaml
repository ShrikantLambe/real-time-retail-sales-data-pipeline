# All sensitive values are passed as Helm install-time parameters or from
# an external secret manager (e.g. AWS Secrets Manager, Vault).
# Example:
#   helm install retail-pipeline ./helm \
#     --set snowflake.account=MY_ACCOUNT \
#     --set snowflake.user=MY_USER \
#     --set-string snowflake.password=MY_PASS \
#     --set airflow.fernetKey=$(python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())") \
#     --set superset.secretKey=$(openssl rand -base64 42)
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "retail-pipeline.name" . }}-secrets
  labels:
    {{- include "retail-pipeline.labels" . | nindent 4 }}
type: Opaque
stringData:
  SNOWFLAKE_ACCOUNT:   {{ .Values.snowflake.account | quote }}
  SNOWFLAKE_USER:      {{ .Values.snowflake.user | quote }}
  SNOWFLAKE_PASSWORD:  {{ .Values.snowflake.password | default "" | quote }}
  SNOWFLAKE_DATABASE:  {{ .Values.snowflake.database | quote }}
  SNOWFLAKE_SCHEMA:    {{ .Values.snowflake.schema | quote }}
  SNOWFLAKE_WAREHOUSE: {{ .Values.snowflake.warehouse | quote }}
  SNOWFLAKE_ROLE:      {{ .Values.snowflake.role | quote }}
  AIRFLOW_FERNET_KEY:  {{ .Values.airflow.fernetKey | quote }}
  SUPERSET_SECRET_KEY: {{ .Values.superset.secretKey | quote }}
  SLACK_WEBHOOK_URL:   {{ .Values.slack.webhookUrl | quote }}
  POSTGRES_PASSWORD:   {{ .Values.postgres.password | quote }}
