apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  labels:
    {{- include "retail-pipeline.labels" . | nindent 4 }}
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      {{- include "retail-pipeline.selectorLabels" (dict "root" . "component" "kafka") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "retail-pipeline.selectorLabels" (dict "root" . "component" "kafka") | nindent 8 }}
    spec:
      containers:
        - name: kafka
          image: {{ .Values.images.kafka }}
          env:
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: "zookeeper:2181"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "{{ .Values.kafka.replicationFactor }}"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          ports:
            - containerPort: 9092
          livenessProbe:
            exec:
              command: ["kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.storage.kafka }}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    {{- include "retail-pipeline.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "retail-pipeline.selectorLabels" (dict "root" . "component" "kafka") | nindent 4 }}
  ports:
    - port: 9092
      name: broker
---
# Schema Registry
apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-registry
  labels:
    {{- include "retail-pipeline.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "retail-pipeline.selectorLabels" (dict "root" . "component" "schema-registry") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "retail-pipeline.selectorLabels" (dict "root" . "component" "schema-registry") | nindent 8 }}
    spec:
      containers:
        - name: schema-registry
          image: {{ .Values.images.schemaRegistry }}
          env:
            - name: SCHEMA_REGISTRY_HOST_NAME
              value: schema-registry
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: kafka:9092
            - name: SCHEMA_REGISTRY_LISTENERS
              value: http://0.0.0.0:8081
          ports:
            - containerPort: 8081
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: schema-registry
  labels:
    {{- include "retail-pipeline.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "retail-pipeline.selectorLabels" (dict "root" . "component" "schema-registry") | nindent 4 }}
  ports:
    - port: 8081
      name: http
