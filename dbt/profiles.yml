default:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'DATA_ENGINEER') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'RETAIL_DB') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'RETAIL_WH') }}"
      schema: "{{ env_var('SNOWFLAKE_SCHEMA', 'STREAMING') }}"
      threads: 4
      client_session_keep_alive: false
